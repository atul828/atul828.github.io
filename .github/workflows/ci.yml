name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          AE651A: ${{ secrets.AE651A }}
          BCE4AD: ${{ secrets.BCE4AD }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AE651A', '')
          bm = os.environ.get('BCE4AD', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- f74dd8a5cfd4045ff64a0794671b15907757266f -->', gm)
          if bm:
              s2 = s2.replace('<!-- 09f93b006198897932cffa9c7ca9dd73 -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: publish
        uses: actions/deploy-pages@v4
